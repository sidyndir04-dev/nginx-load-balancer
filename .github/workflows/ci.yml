name: CI - Nginx Load Balancer Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  nginx-syntax-check:
    name: Verification syntaxe Nginx
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Verifier la syntaxe de nginx.conf
        run: |
          docker run --rm -v ${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro nginx:alpine nginx -t
          echo Syntaxe valide

  integration-tests:
    name: Tests fonctionnels Nginx
    runs-on: ubuntu-latest
    needs: nginx-syntax-check
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Demarrer les services Docker Compose
        run: docker compose up -d
        timeout-minutes: 2
      - name: Attendre que Nginx soit pret
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:80/ > /dev/null 2>&1; then
              echo Nginx pret; exit 0
            fi
            sleep 3
          done
          docker compose logs; exit 1
      - name: TEST1 GET autorise 200
        run: |
          R=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/)
          [ "$R" = "200" ] && echo PASS-GET || (echo FAIL-GET-$R && exit 1)
      - name: TEST2 POST autorise 200
        run: |
          R=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:80/)
          [ "$R" = "200" ] && echo PASS-POST || (echo FAIL-POST-$R && exit 1)
      - name: TEST3 DELETE bloque 403
        run: |
          R=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE http://localhost:80/)
          [ "$R" = "403" ] && echo PASS-DELETE || (echo FAIL-DELETE-$R && exit 1)
      - name: TEST4 PUT bloque 403
        run: |
          R=$(curl -s -o /dev/null -w "%{http_code}" -X PUT http://localhost:80/)
          [ "$R" = "403" ] && echo PASS-PUT || (echo FAIL-PUT-$R && exit 1)
      - name: TEST5 XSS bloque 403
        run: |
          R=$(curl -s -o /dev/null -w "%{http_code}" --globoff "http://localhost:80/?q=%3Cscript%3E")
          [ "$R" = "403" ] && echo PASS-XSS || (echo FAIL-XSS-$R && exit 1)
      - name: TEST6 SQLi bloque 403
        run: |
          R=$(curl -s -o /dev/null -w "%{http_code}" --globoff "http://localhost:80/?q=UNION%20SELECT")
          [ "$R" = "403" ] && echo PASS-SQLI || (echo FAIL-SQLI-$R && exit 1)
      - name: TEST7 Headers securite
        run: |
          H=$(curl -sI http://localhost:80/)
          echo "$H" | grep -qi "X-Frame-Options" && echo PASS-XFO || (echo FAIL-XFO && exit 1)
          echo "$H" | grep -qi "X-Content-Type-Options" && echo PASS-XCTO || (echo FAIL-XCTO && exit 1)
          echo "$H" | grep -qi "Content-Security-Policy" && echo PASS-CSP || (echo FAIL-CSP && exit 1)
      - name: Logs echec
        if: failure()
        run: docker compose logs
      - name: Stop services
        if: always()
        run: docker compose down
