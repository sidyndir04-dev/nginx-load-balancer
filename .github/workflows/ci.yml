name: CI — Nginx Load Balancer Tests

on:
  push:
      branches: [ main ]
        pull_request:
            branches: [ main ]

            jobs:
              # ============================================================
                # JOB 1 : Valider la syntaxe nginx.conf
                  # ============================================================
                    nginx-syntax-check:
                        name: Verification syntaxe Nginx
                            runs-on: ubuntu-latest

                                steps:
                                      - name: Checkout du code
                                              uses: actions/checkout@v4

                                                    - name: Verifier la syntaxe de nginx.conf
                                                            run: |
                                                                      docker run --rm \
                                                                                  -v ${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
                                                                                              nginx:alpine nginx -t
                                                                                                        echo "✅ Syntaxe nginx.conf valide"
                                                                                                        
                                                                                                          # ============================================================
                                                                                                            # JOB 2 : Tests fonctionnels (Docker Compose)
                                                                                                              # ============================================================
                                                                                                                integration-tests:
                                                                                                                    name: Tests fonctionnels Nginx
                                                                                                                        runs-on: ubuntu-latest
                                                                                                                            needs: nginx-syntax-check
                                                                                                                            
                                                                                                                                steps:
                                                                                                                                      - name: Checkout du code
                                                                                                                                              uses: actions/checkout@v4
                                                                                                                                              
                                                                                                                                                    - name: Demarrer les services Docker Compose
                                                                                                                                                            run: docker compose up -d --wait
                                                                                                                                                                    timeout-minutes: 2
                                                                                                                                                                    
                                                                                                                                                                          - name: Attendre que Nginx soit pret
                                                                                                                                                                                  run: |
                                                                                                                                                                                            for i in $(seq 1 15); do
                                                                                                                                                                                                        if curl -sf http://localhost:80/ > /dev/null 2>&1; then
                                                                                                                                                                                                                      echo "✅ Nginx est pret"
                                                                                                                                                                                                                                    break
                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                            echo "Attente... ($i/15)"
                                                                                                                                                                                                                                                                        sleep 2
                                                                                                                                                                                                                                                                                  done
                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                        - name: TEST 1 - Load balancing (GET autorise)
                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                          echo "=== Test GET sur / ==="
                                                                                                                                                                                                                                                                                                                    RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/)
                                                                                                                                                                                                                                                                                                                              echo "HTTP Status: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                        if [ "$RESPONSE" = "200" ]; then
                                                                                                                                                                                                                                                                                                                                                    echo "✅ GET autorise - reponse 200"
                                                                                                                                                                                                                                                                                                                                                              else
                                                                                                                                                                                                                                                                                                                                                                          echo "❌ ERREUR : attendu 200, recu $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                      exit 1
                                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                      - name: TEST 2 - POST autorise (HTTP 200)
                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                        echo "=== Test POST sur / ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                  RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "HTTP Status: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                      if [ "$RESPONSE" = "200" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "✅ POST autorise - reponse 200"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "❌ ERREUR : attendu 200, recu $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: TEST 3 - DELETE bloque (HTTP 403)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "=== Test DELETE bloque ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "HTTP Status: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if [ "$RESPONSE" = "403" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "✅ DELETE bloque - reponse 403"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "❌ ERREUR : attendu 403, recu $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: TEST 4 - PUT bloque (HTTP 403)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "=== Test PUT bloque ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "HTTP Status: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if [ "$RESPONSE" = "403" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "✅ PUT bloque - reponse 403"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "❌ ERREUR : attendu 403, recu $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: TEST 5 - Blocage XSS dans URL
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "=== Test XSS dans URL ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:80/?q=<script>alert(1)</script>")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "HTTP Status: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if [ "$RESPONSE" = "403" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "✅ XSS bloque - reponse 403"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "❌ ERREUR : attendu 403, recu $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: TEST 6 - Blocage SQL Injection dans URL
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "=== Test SQL Injection dans URL ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:80/?q=UNION%20SELECT%20*%20FROM%20users")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "HTTP Status: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if [ "$RESPONSE" = "403" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "✅ SQL Injection bloque - reponse 403"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "❌ ERREUR : attendu 403, recu $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: TEST 7 - Headers de securite presents
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "=== Verification des headers de securite ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        HEADERS=$(curl -sI http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "$HEADERS"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            check_header() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if echo "$HEADERS" | grep -qi "$1"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "✅ Header $1 present"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "❌ MANQUANT : header $1"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              check_header "X-Frame-Options"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        check_header "X-XSS-Protection"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  check_header "X-Content-Type-Options"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            check_header "Content-Security-Policy"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      check_header "Strict-Transport-Security"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                check_header "Referrer-Policy"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: TEST 8 - Load balancing round-robin
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "=== Test load balancing (10 requetes) ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  RESPONSES=""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for i in $(seq 1 10); do
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        BODY=$(curl -s http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    RESPONSES="$RESPONSES $BODY"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              done
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "Reponses recues : $RESPONSES"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if echo "$RESPONSES" | grep -q "App1" && echo "$RESPONSES" | grep -q "App2"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "✅ Load balancing OK - les deux backends ont repondu"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "⚠️ Attention : un seul backend a repondu (peut etre normal si connexions persistantes)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Afficher les logs Docker en cas d'echec
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if: failure()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: docker compose logs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Arreter les services
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: docker compose down
