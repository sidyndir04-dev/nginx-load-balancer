name: CI - Nginx Load Balancer Tests

on:
  push:
      branches: [ main ]
        pull_request:
            branches: [ main ]

            jobs:
              nginx-syntax-check:
                  name: Verification syntaxe Nginx
                      runs-on: ubuntu-latest
                          steps:
                                - name: Checkout du code
                                        uses: actions/checkout@v4
                                              - name: Verifier la syntaxe de nginx.conf
                                                      run: |
                                                                docker run --rm \
                                                                            -v ${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
                                                                                        nginx:alpine nginx -t
                                                                                                  echo "Syntaxe nginx.conf valide"

                                                                                                    integration-tests:
                                                                                                        name: Tests fonctionnels Nginx
                                                                                                            runs-on: ubuntu-latest
                                                                                                                needs: nginx-syntax-check
                                                                                                                    steps:
                                                                                                                          - name: Checkout du code
                                                                                                                                  uses: actions/checkout@v4
                                                                                                                                  
                                                                                                                                        - name: Demarrer les services Docker Compose
                                                                                                                                                run: docker compose up -d
                                                                                                                                                        timeout-minutes: 2
                                                                                                                                                        
                                                                                                                                                              - name: Attendre que Nginx soit pret
                                                                                                                                                                      run: |
                                                                                                                                                                                for i in $(seq 1 20); do
                                                                                                                                                                                            if curl -sf http://localhost:80/ > /dev/null 2>&1; then
                                                                                                                                                                                                          echo "Nginx est pret"
                                                                                                                                                                                                                        exit 0
                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                echo "Attente... ($i/20)"
                                                                                                                                                                                                                                                            sleep 3
                                                                                                                                                                                                                                                                      done
                                                                                                                                                                                                                                                                                echo "Nginx non accessible"
                                                                                                                                                                                                                                                                                          docker compose logs
                                                                                                                                                                                                                                                                                                    exit 1
                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                          - name: TEST 1 - GET autorise
                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                      echo "HTTP Status GET: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                [ "$RESPONSE" = "200" ] && echo "PASS - GET autorise" || (echo "FAIL - GET attendu 200 recu $RESPONSE" && exit 1)
                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                      - name: TEST 2 - POST autorise
                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                                                                  echo "HTTP Status POST: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                            [ "$RESPONSE" = "200" ] && echo "PASS - POST autorise" || (echo "FAIL - POST attendu 200 recu $RESPONSE" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                  - name: TEST 3 - DELETE bloque 403
                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                    RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                                                                                                              echo "HTTP Status DELETE: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                        [ "$RESPONSE" = "403" ] && echo "PASS - DELETE bloque" || (echo "FAIL - DELETE attendu 403 recu $RESPONSE" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: TEST 4 - PUT bloque 403
                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "HTTP Status PUT: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    [ "$RESPONSE" = "403" ] && echo "PASS - PUT bloque" || (echo "FAIL - PUT attendu 403 recu $RESPONSE" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: TEST 5 - XSS bloque dans URL
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --globoff "http://localhost:80/?q=%3Cscript%3Ealert(1)%3C/script%3E")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "HTTP Status XSS: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                [ "$RESPONSE" = "403" ] && echo "PASS - XSS bloque" || (echo "FAIL - XSS attendu 403 recu $RESPONSE" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: TEST 6 - SQL Injection bloque dans URL
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --globoff "http://localhost:80/?q=UNION%20SELECT%20*%20FROM%20users")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "HTTP Status SQLi: $RESPONSE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            [ "$RESPONSE" = "403" ] && echo "PASS - SQLi bloque" || (echo "FAIL - SQLi attendu 403 recu $RESPONSE" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: TEST 7 - Headers de securite presents
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    HEADERS=$(curl -sI http://localhost:80/)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "$HEADERS"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "$HEADERS" | grep -qi "X-Frame-Options" && echo "PASS X-Frame-Options" || (echo "FAIL X-Frame-Options manquant" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "$HEADERS" | grep -qi "X-XSS-Protection" && echo "PASS X-XSS-Protection" || (echo "FAIL X-XSS-Protection manquant" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "$HEADERS" | grep -qi "X-Content-Type-Options" && echo "PASS X-Content-Type-Options" || (echo "FAIL X-Content-Type-Options manquant" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "$HEADERS" | grep -qi "Content-Security-Policy" && echo "PASS CSP" || (echo "FAIL CSP manquant" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "$HEADERS" | grep -qi "Strict-Transport-Security" && echo "PASS HSTS" || (echo "FAIL HSTS manquant" && exit 1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Afficher les logs en cas d echec
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if: failure()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: docker compose logs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Arreter les services
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: docker compose down
