services:
  app1:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./backend/app1:/app
    command: node index.js
    networks:
      - backend_net
    expose:
      - "3000"

  app2:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./backend/app2:/app
    command: node index.js
    networks:
      - backend_net
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge
