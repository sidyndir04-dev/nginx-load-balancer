# nginx.conf - Challenge n5 : Load Balancer + Securite Nginx

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ----- Rate limiting zone : 10 req/min par IP -----------
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/m;

    # ----- Upstream : 2 backends Node.js (round-robin) ------
    upstream backend_pool {
        server app1:3000;
        server app2:3001;
    }

    server {
        listen 80;
        server_name _;

        # 1. BLOQUER LES METHODES HTTP (seuls GET et POST autorises)
        if ($request_method !~ ^(GET|POST)$) {
            return 403;
        }

        # 3. BLOCAGE DES PATTERNS SUSPECTS DANS L'URL (XSS / SQLi)
        # Detecte les formes brutes ET URL-encodees
        set $bad_request 0;

        # XSS - forme brute: <script> etc.
        if ($request_uri ~* "(<script|javascript:|onerror=|onload=|alert\()") {
            set $bad_request 1;
        }

        # XSS - forme URL-encodee: %3Cscript%3E = <script>
        if ($request_uri ~* "(%3Cscript|%3escript|javascript%3a|onerror%3d|onload%3d)") {
            set $bad_request 1;
        }

        # SQL Injection - forme brute
        if ($request_uri ~* "(union\s+select|drop\s+table|insert\s+into|delete\s+from|select\s+\*)") {
            set $bad_request 1;
        }

        # SQL Injection - UNION SELECT URL-encode: UNION%20SELECT
        if ($request_uri ~* "(union(%20|\+)select|drop(%20|\+)table)") {
            set $bad_request 1;
        }

        # Path Traversal
        if ($request_uri ~* "(\.\./|\.\.\.%2f|%2e%2e/)") {
            set $bad_request 1;
        }

        if ($bad_request = 1) {
            return 403;
        }

        # 4. HEADERS HTTP DE SECURITE
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "no-referrer" always;

        # 2. RATE LIMITING : 10 requetes par minute par IP -> 429
        limit_req zone=per_ip burst=5 nodelay;
        limit_req_status 429;

        # 5. REVERSE PROXY vers le pool de backends (load balancing round-robin)
        location / {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # Page d'erreur pour rate limiting
        error_page 429 = @rate_limit_error;
        location @rate_limit_error {
            add_header Content-Type "application/json" always;
            return 429 '{"error":"Too Many Requests","message":"Max 10 requetes par minute par IP"}';
        }
    }
}
