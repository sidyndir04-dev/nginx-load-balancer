# ============================================================
# nginx.conf — Challenge n°5 : Load Balancer + Sécurité Nginx
# ============================================================

# ----- Rate limiting zone : 10 req/min par IP ---------------
limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/m;

# ----- Upstream : 2 backends Node.js (round-robin) ----------
upstream backend_pool {
      server app1:3000;
      server app2:3001;
}

server {
      listen 80;
      server_name _;

      # ----------------------------------------------------------
      # 1. BLOQUER LES METHODES HTTP (seuls GET et POST autorisés)
      # ----------------------------------------------------------
      if ($request_method !~ ^(GET|POST)$) {
            return 403 '{"error":"Method Not Allowed"}';
  }

      # ----------------------------------------------------------
      # 2. RATE LIMITING : 10 requetes par minute par IP → 429
      # ----------------------------------------------------------
      limit_req zone=per_ip burst=2 nodelay;
      limit_req_status 429;

      # ----------------------------------------------------------
      # 3. BLOCAGE DES PATTERNS SUSPECTS DANS L'URL (XSS / SQLi)
      # ----------------------------------------------------------
      set $bad_request 0;

      # Détecter XSS
      if ($request_uri ~* "(<script|javascript:|onerror=|onload=|alert\()") {
            set $bad_request 1;
  }

      # Détecter SQL Injection
      if ($request_uri ~* "(union\s+select|drop\s+table|insert\s+into|delete\s+from|select\s+\*|--|;--)") {
            set $bad_request 1;
  }

      # Détecter Path Traversal
      if ($request_uri ~* "(\.\./|\.\.%2f|%2e%2e/)") {
            set $bad_request 1;
  }

      if ($bad_request = 1) {
            return 403 '{"error":"Forbidden - Suspicious pattern detected"}';
  }

      # ----------------------------------------------------------
      # 4. HEADERS HTTP DE SECURITE
      # ----------------------------------------------------------
      add_header X-Frame-Options "DENY" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Content-Security-Policy "default-src 'self'" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header Referrer-Policy "no-referrer" always;

      # ----------------------------------------------------------
      # 5. REVERSE PROXY vers le pool de backends (load balancing)
      # ----------------------------------------------------------
      location / {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # Masquer la version du serveur backend
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
  }

      # ----------------------------------------------------------
      # Page d'erreur personnalisée pour le rate limiting
      # ----------------------------------------------------------
      error_page 429 = @rate_limit_error;
      location @rate_limit_error {
            add_header Content-Type "application/json" always;
            return 429 '{"error":"Too Many Requests","message":"Max 10 requetes par minute par IP"}';
  }
}
